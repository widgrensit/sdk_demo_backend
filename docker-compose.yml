services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: sdk_demo_backend
    ports:
      - "5436:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      # -h forces a TCP check (the initdb bootstrap server only answers on the
      # unix socket) and -d gates on the target database existing, so asobi does
      # not boot and migrate until Postgres is genuinely query-ready.
      test: ["CMD-SHELL", "pg_isready -U postgres -d sdk_demo_backend -h 127.0.0.1 -p 5432"]
      interval: 3s
      timeout: 5s
      retries: 15
      start_period: 20s

  asobi:
    image: ghcr.io/widgrensit/asobi_lua:latest
    restart: on-failure
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8084:8084"
    volumes:
      - ./lua:/app/game:ro
    environment:
      ASOBI_PORT: "8084"
      ASOBI_NODE_HOST: "127.0.0.1"
      ERLANG_COOKIE: sdk_demo_backend_dev
      ASOBI_DB_HOST: postgres
      ASOBI_DB_NAME: sdk_demo_backend
      ASOBI_DB_USER: postgres
      ASOBI_DB_PASSWORD: postgres

volumes:
  pgdata:
